name: Deploy to GitHub Pages

# Publishes the game to the gh-pages branch. GitHub serves that branch at
# https://bradws4eva.github.io/Two_Brothers/ — no Pages settings needed,
# creating the branch auto-enables Pages (branch source).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push site to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git rm -rf --cached . >/dev/null
          # only the runtime files — .github is excluded on purpose so the
          # default GITHUB_TOKEN (no workflows permission) can push this branch
          git add index.html game.js sw.js manifest.webmanifest icons
          git commit -m "Deploy site from $GITHUB_SHA"
          git push -f origin gh-pages
